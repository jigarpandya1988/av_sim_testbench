name: CI

on:
  push:
    branches: [master, main, "release/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check . --output-format=github
      - run: mypy . --ignore-missing-imports || true

  # -----------------------------------------------------------------------
  # Cross-platform unit test matrix
  # -----------------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --junitxml=reports/junit-${{ matrix.os }}-${{ matrix.python-version }}.xml \
            --cov=. \
            --cov-report=xml:reports/coverage-${{ matrix.os }}-${{ matrix.python-version }}.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: reports/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage-${{ matrix.os }}-${{ matrix.python-version }}.xml
          flags: ${{ matrix.os }}-python${{ matrix.python-version }}

  # -----------------------------------------------------------------------
  # Smoke suite — Linux only (fast gate)
  # -----------------------------------------------------------------------
  smoke-suite:
    name: Smoke Scenario Suite
    runs-on: ubuntu-latest
    needs: test
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run smoke suite
        run: |
          mkdir -p reports
          python main.py \
            --suite smoke \
            --workers 4 \
            --report reports/smoke_${{ github.run_number }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_number }}
          path: reports/smoke_*.json

  # -----------------------------------------------------------------------
  # Docker build — Linux only (Docker not available on macOS/Windows runners)
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: false
          tags: av-sim-testbench:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------
  # Property-based tests — run on all platforms to catch platform-specific
  # edge cases in floating-point and random behaviour
  # -----------------------------------------------------------------------
  property-tests:
    name: Property Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run property tests
        run: pytest tests/test_properties.py -v --tb=short

name: CI

on:
  push:
    branches: [master, main, "release/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check . --output-format=github
      - run: mypy . --ignore-missing-imports || true   # non-blocking until stubs complete

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --junitxml=reports/junit-${{ matrix.python-version }}.xml \
            --cov=. \
            --cov-report=xml:reports/coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage-${{ matrix.python-version }}.xml
          flags: python${{ matrix.python-version }}

  smoke-suite:
    name: Smoke Scenario Suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run smoke suite
        run: |
          python main.py \
            --suite smoke \
            --workers 4 \
            --report reports/smoke_${{ github.run_number }}.json
      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_number }}
          path: reports/smoke_*.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: false
          tags: av-sim-testbench:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  property-tests:
    name: Property-Based Tests (Hypothesis)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run property tests
        run: pytest tests/test_properties.py -v --tb=short
